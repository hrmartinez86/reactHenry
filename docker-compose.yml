services:
  mysql:
    image: mysql:8.0
    container_name: reacthenrry-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: proficiencies
    ports:
      - "3312:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - reacthenrry-network

  back:
    build:
      context: ./back
      dockerfile: Dockerfile
    container_name: reacthenrry-back
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 4010
      DB_HOST: mysql
      DB_USER: root
      DB_PASS: root
      DB_PORT: 3306
      DB_NAME: proficiencies
    ports:
      - "4010:4010"
    volumes:
      - ./back:/app
      - back_node_modules:/app/node_modules
      - back_uploads:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - reacthenrry-network

  front:
    build:
      context: ./front
      dockerfile: Dockerfile
    container_name: reacthenrry-front
    restart: unless-stopped
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      CHOKIDAR_USEPOLLING: "true"
      REACT_APP_API_BASE_URL: /api
    volumes:
      - ./front:/app
      - front_node_modules:/app/node_modules
    depends_on:
      - back
    networks:
      - reacthenrry-network

  nginx:
    image: nginx:alpine
    container_name: reacthenrry-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - front
      - back
    networks:
      - reacthenrry-network

volumes:
  mysql_data:
  back_node_modules:
  front_node_modules:
  back_uploads:

networks:
  reacthenrry-network:
    driver: bridge
